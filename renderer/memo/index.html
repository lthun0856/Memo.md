<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title></title>
  <link rel="stylesheet" href="memo.css" />
</head>
<body>
  <div class="card">
    <div class="titlebar" id="titlebar">
      <span class="topic-chip" id="topicChip"></span>
      <input type="text" id="titleInput" class="title-input" maxlength="60" />
      <div class="titlebar-actions">
        <button id="btnNewMemo" class="icon-btn">＋</button>
        <input type="color" id="colorPicker" class="color-input" />
        <button id="btnPin" class="icon-btn pin-btn"></button>
        <button id="btnKeepToggle" class="status-dot-btn md-feature"></button>
        <button id="btnDelete" class="icon-btn">🗑</button>
      </div>
      <div class="titlebar-persistent-actions">
        <button id="btnCollapseMemo" class="icon-btn collapse-toggle-btn">▾</button>
        <button id="btnClose" class="icon-btn">×</button>
      </div>
    </div>

    <div class="checklist-area" id="checklistArea" hidden>
      <div class="checklist-list" id="checklistList"></div>
      <div class="checklist-actions">
        <button type="button" id="btnChecklistAdd" class="checklist-add-btn"></button>
        <button type="button" id="btnChecklistRevertAll" class="checklist-revert-btn"></button>
      </div>
    </div>

    <div class="editor-area" id="editorArea">
      <textarea id="content" spellcheck="false"></textarea>
      <div class="canvas-layer" id="canvasLayer"></div>
    </div>

    <div class="attachment-strip" id="attachmentStrip"></div>

    <!-- 하단 통합 바: 윗줄(빠른 도구) = 실행취소/다시실행 + 체크리스트/첨부/특수문자 + 상태문구,
         아랫줄 = 서식 버튼들(B, 왼쪽·좁으면 잘림) + 기능 버튼들(A, 오른쪽 고정).
         예전 상단 도구바가 편집 시작/종료 때마다 나타났다 사라지며 본문 글이 위아래로 밀리던
         문제 때문에 전부 하단으로 모음. MD기능을 끄면 서식 줄이 사라지고 두 줄이 한 줄로 합쳐짐 -->
    <div class="bottombar" id="bottombar">
      <div class="bb-quick">
        <button data-cmd="undo" id="btnUndo">↶</button>
        <button data-cmd="redo" id="btnRedo">↷</button>
        <span class="sep"></span>
        <button data-cmd="checklist" id="btnChecklistCmd">
          <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="7" height="7" rx="1.5"/><path d="M4.5 7.5l1.3 1.3L8.5 6"/><line x1="13" y1="7.5" x2="21" y2="7.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><line x1="13" y1="17.5" x2="21" y2="17.5"/></svg>
        </button>
        <button data-cmd="attach" id="btnAttachCmd">
          <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4.5h7.5L18 9v11a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V5.5a1 1 0 0 1 1-1z"/><path d="M13.5 4.5V9H18"/><path d="M11.5 3.5a1.6 1.6 0 0 0-1.6 1.6V8a1.1 1.1 0 0 0 2.2 0V5.6"/><line x1="7.5" y1="13.5" x2="10.5" y2="13.5"/><line x1="7.5" y1="16.5" x2="13.5" y2="16.5"/><line x1="7.5" y1="19.5" x2="13.5" y2="19.5"/></svg>
        </button>
        <span class="sep" id="specialCharSep" hidden></span>
        <div class="special-char-group" id="specialCharGroup"></div>
        <span id="statusText" class="status"></span>
      </div>
      <div class="bb-main">
        <div class="toolbar" id="toolbar">
          <select id="headingSelect" class="md-feature">
            <option value="" id="optHeadingNormal"></option>
            <option value="# " id="optHeading1"></option>
            <option value="## " id="optHeading2"></option>
            <option value="### " id="optHeading3"></option>
          </select>
          <button data-cmd="list" class="md-feature" id="btnList">•</button>
          <button data-cmd="indent" class="md-feature" id="btnIndent">⇥</button>
          <span class="sep md-feature"></span>
          <button data-cmd="bold" class="md-feature" id="btnBold"><b>B</b></button>
          <button data-cmd="italic" class="md-feature" id="btnItalic"><i>I</i></button>
          <button data-cmd="strike" class="md-feature" id="btnStrike"><s>S</s></button>
          <button data-cmd="underline" class="md-feature" id="btnUnderline"><u>U</u></button>
          <button data-cmd="highlight" class="md-feature" id="btnHighlight">🖍</button>
          <button data-cmd="code" class="md-feature" id="btnCode">&lt;/&gt;</button>
          <span class="sep md-feature"></span>
          <button data-cmd="link" class="md-feature" id="btnLink">
            <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M10 14a4 4 0 0 0 6 0l3-3a4 4 0 0 0-6-6l-1 1"/><path d="M14 10a4 4 0 0 0-6 0l-3 3a4 4 0 0 0 6 6l1-1"/></svg>
          </button>
          <button data-cmd="sup" class="md-feature" id="btnSup">x²</button>
          <button data-cmd="sub" class="md-feature" id="btnSub">x₂</button>
        </div>
        <div class="footer-actions">
        <button id="btnMoveTopic" class="footer-icon-btn">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2.5"/><path d="M9 15l6-6"/><path d="M10 9h5v5"/></svg>
        </button>
        <button id="btnSaveTemplate" class="footer-icon-btn">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3.5h12v17l-6-4-6 4v-17z"/></svg>
        </button>
        <button id="btnCopy" class="footer-icon-btn">
          <svg viewBox="0 0 24 24" width="14" height="14"><rect x="8" y="8" width="12" height="13" rx="1.5" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M5 16V5.5A1.5 1.5 0 0 1 6.5 4H15" fill="none" stroke="currentColor" stroke-width="1.6"/></svg>
        </button>
        <button id="btnImport" class="footer-icon-btn">⤒</button>
        <button id="btnExportTxt" class="footer-icon-btn">
          <svg viewBox="0 0 24 24" width="16" height="16"><path d="M6 2h9l5 5v15H6z" fill="none" stroke="currentColor" stroke-width="1.6"/><path d="M14 2v6h6" fill="none" stroke="currentColor" stroke-width="1.6"/><line x1="9" y1="13" x2="16" y2="13" stroke="currentColor" stroke-width="1.4"/><line x1="9" y1="16.5" x2="16" y2="16.5" stroke="currentColor" stroke-width="1.4"/></svg>
        </button>
        <button data-cmd="memolink" id="btnMemoLink" class="footer-icon-btn md-feature">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="8" height="8" rx="1.5"/><rect x="13" y="12" width="8" height="8" rx="1.5"/><path d="M9 12L15 12" stroke-dasharray="2 2"/></svg>
        </button>
        <button id="btnExport" class="export-btn md-feature">
          <span id="btnExportLabel"></span>
        </button>
        </div><!-- /footer-actions -->
      </div><!-- /bb-main -->
    </div><!-- /bottombar -->
  </div>

  <div class="modal-overlay" id="exportModal" hidden>
    <div class="modal-box">
      <p class="modal-title" id="exportModalTitle"></p>
      <input type="text" id="exportFileNameInput" class="modal-input" maxlength="80" />
      <div class="modal-actions">
        <button id="exportModalCancel" class="modal-btn modal-btn-cancel" type="button"></button>
        <button id="exportModalConfirm" class="modal-btn modal-btn-confirm" type="button"></button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="linkModal" hidden>
    <div class="modal-box">
      <p class="modal-title" id="linkModalTitle"></p>
      <input type="text" id="linkUrlInput" class="modal-input" placeholder="https://" />
      <div class="modal-actions">
        <button id="linkModalCancel" class="modal-btn modal-btn-cancel" type="button"></button>
        <button id="linkModalConfirm" class="modal-btn modal-btn-confirm" type="button"></button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="moveTopicModal" hidden>
    <div class="modal-box memo-link-box">
      <p class="modal-title" id="moveTopicModalTitle"></p>
      <div class="memo-link-list" id="moveTopicList"></div>
      <div class="modal-actions">
        <button id="moveTopicModalCancel" class="modal-btn modal-btn-cancel" type="button"></button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="checklistRevertModal" hidden>
    <div class="modal-box">
      <p class="modal-title" id="checklistRevertModalTitle"></p>
      <p class="modal-hint" id="checklistRevertModalHint"></p>
      <div class="modal-actions">
        <button id="checklistRevertCancel" class="modal-btn modal-btn-cancel" type="button"></button>
        <button id="checklistRevertConfirm" class="modal-btn modal-btn-confirm" type="button"></button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="templateModal" hidden>
    <div class="modal-box memo-link-box">
      <p class="modal-title" id="templateModalTitle"></p>
      <p class="modal-hint" id="templateModalHint"></p>
      <div class="memo-link-list" id="templateTopicList"></div>
      <div class="modal-actions">
        <button id="templateModalCancel" class="modal-btn modal-btn-cancel" type="button"></button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="imageResizeNoticeModal" hidden>
    <div class="modal-box">
      <p class="modal-title" id="imageResizeNoticeTitle"></p>
      <p class="modal-hint" id="imageResizeNoticeHint"></p>
      <div class="modal-actions">
        <button id="imageResizeNoticeConfirm" class="modal-btn modal-btn-confirm" type="button"></button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="confirmModal" hidden>
    <div class="modal-box">
      <p class="modal-title" id="confirmModalTitle"></p>
      <p class="modal-hint" id="confirmModalHint"></p>
      <div class="modal-actions">
        <button id="confirmModalCancel" class="modal-btn modal-btn-cancel" type="button"></button>
        <button id="confirmModalConfirm" class="modal-btn modal-btn-confirm" type="button"></button>
      </div>
    </div>
  </div>

  <script src="../lang/ko.js"></script>
  <script src="memo.js"></script>
</body>
</html>
